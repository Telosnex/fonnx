  # contains C++-only provider headers that are not valid Dart FFI input.
  entry-points:
    - "../onnx_runtime/headers/onnxruntime_c_api.h"
ffi-native:
preamble: |
  // ignore_for_file: type=lint, unused_field, unused_element
