name: fonnx
description: A new Flutter plugin project.
version: 0.0.1
homepage:

environment:
  # Native-assets hooks require Dart 3.9 or newer.
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  archive: ^4.0.9
  code_assets: ^1.0.0
  crypto: ^3.0.6
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  hooks: ^1.0.1
  ml_linalg: ^13.12.6
  path: ^1.9.1
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1

flutter:
  plugin:
    platforms:
      # Android and desktop native libraries are delivered by hook/build.dart.
      # iOS remains a plugin temporarily, until its dynamic ORT framework is
      # produced by fork CI and the final platform channel is removed.
      ios:
        pluginClass: FonnxPlugin
      web:
        pluginClass: FonnxWeb
        fileName: fonnx_web.dart